# Firebase App Hosting 設定ファイル
# https://firebase.google.com/docs/app-hosting/configure

# Cloud Run サービス設定
runConfig:
  cpu: 1
  memoryMiB: 1024
  minInstances: 0   # 0=コールドスタートあり、1以上=常時起動（コスト増）
  maxInstances: 10
  concurrency: 80

# 環境変数
# NEXT_PUBLIC_* は公開情報なので value で直接設定OK
# APIキー等の秘密情報は secret で Cloud Secret Manager を参照
env:
  # ===== 基本設定 =====
  - variable: NEXT_PUBLIC_SELECT_LANGUAGE
    value: "ja"
  - variable: NEXT_PUBLIC_CHANGE_ENGLISH_TO_JAPANESE
    value: "false"
  - variable: NEXT_PUBLIC_SHOW_INTRODUCTION
    value: "false"
  - variable: NEXT_PUBLIC_ALWAYS_OVERRIDE_WITH_ENV_VARIABLES
    value: "true"
  - variable: NEXT_PUBLIC_SHOW_ASSISTANT_TEXT
    value: "true"
  - variable: NEXT_PUBLIC_SHOW_CHARACTER_NAME
    value: "true"
  - variable: NEXT_PUBLIC_SHOW_CONTROL_PANEL
    value: "true"
  - variable: NEXT_PUBLIC_COLOR_THEME
    value: "default"
  - variable: NEXT_PUBLIC_RESTRICTED_MODE
    value: "false"
  - variable: NEXT_PUBLIC_LIVE2D_ENABLED
    value: "false"

  # ===== キャラクター設定 =====
  - variable: NEXT_PUBLIC_CHARACTER_NAME
    value: "ニケちゃん"
  - variable: NEXT_PUBLIC_USER_DISPLAY_NAME
    value: "YOU"
  - variable: NEXT_PUBLIC_MODEL_TYPE
    value: "vrm"
  - variable: NEXT_PUBLIC_SELECTED_VRM_PATH
    value: "/vrm/nikechan_v2.vrm"
  - variable: NEXT_PUBLIC_SELECTED_LIVE2D_PATH
    value: "/live2d/nike01/nike01.model3.json"
  - variable: NEXT_PUBLIC_SELECTED_PNGTUBER_PATH
    value: "/pngtuber/nike01"
  - variable: NEXT_PUBLIC_LIGHTING_INTENSITY
    value: "1.0"
  - variable: NEXT_PUBLIC_BACKGROUND_IMAGE_PATH
    value: "/backgrounds/bg-c.png"

  # ===== AI設定 =====
  - variable: NEXT_PUBLIC_SELECT_AI_SERVICE
    value: "custom-api"
  - variable: NEXT_PUBLIC_SELECT_AI_MODEL
    value: "custom"
  - variable: NEXT_PUBLIC_MAX_PAST_MESSAGES
    value: "10"
  - variable: NEXT_PUBLIC_TEMPERATURE
    value: "0.7"
  - variable: NEXT_PUBLIC_MAX_TOKENS
    value: "4096"
  - variable: NEXT_PUBLIC_REASONING_MODE
    value: "false"
  - variable: NEXT_PUBLIC_SHOW_THINKING_TEXT
    value: "false"
  - variable: NEXT_PUBLIC_ENABLE_MULTIMODAL
    value: "true"
  - variable: NEXT_PUBLIC_MULTIMODAL_MODE
    value: "ai-decide"
  - variable: NEXT_PUBLIC_CUSTOM_MODEL
    value: "false"

  # ===== カスタムAPI設定 =====
  - variable: NEXT_PUBLIC_CUSTOM_API_URL
    value: "https://wordmarket.sakura.ne.jp/Sheprd/2026_0330_Edy/Choco.cgi"
  - variable: NEXT_PUBLIC_CUSTOM_API_HEADERS
    value: "{}"
  - variable: NEXT_PUBLIC_CUSTOM_API_BODY
    secret: NEXT_PUBLIC_CUSTOM_API_BODY
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_CUSTOM_API_INCLUDE_MIME_TYPE
    value: "false"
  - variable: NEXT_PUBLIC_INCLUDE_SYSTEM_MESSAGES_IN_CUSTOM_API
    value: "true"

  # ===== リアルタイムAPI設定 =====
  - variable: NEXT_PUBLIC_REALTIME_API_MODE
    value: "false"
  - variable: NEXT_PUBLIC_EXTERNAL_LINKAGE_MODE
    value: "false"
  - variable: NEXT_PUBLIC_AUDIO_MODE
    value: "false"

  # ===== 音声合成設定 =====
  - variable: NEXT_PUBLIC_SELECT_VOICE
    value: "openai"
  - variable: NEXT_PUBLIC_SPEECH_RECOGNITION_MODE
    value: "browser"
  - variable: NEXT_PUBLIC_INITIAL_SPEECH_TIMEOUT
    value: "5.0"
  - variable: NEXT_PUBLIC_NO_SPEECH_TIMEOUT
    value: "2.0"
  - variable: NEXT_PUBLIC_SHOW_SILENCE_PROGRESS_BAR
    value: "true"
  - variable: NEXT_PUBLIC_CONTINUOUS_MIC_LISTENING_MODE
    value: "true"

  # ===== YouTube設定 =====
  - variable: NEXT_PUBLIC_YOUTUBE_MODE
    value: "false"

  # ===== その他UI設定 =====
  - variable: NEXT_PUBLIC_SHOW_QUICK_MENU
    value: "true"
  - variable: NEXT_PUBLIC_SHOW_PRESET_QUESTIONS
    value: "false"
  - variable: NEXT_PUBLIC_MESSAGE_RECEIVER_ENABLED
    value: "false"
  - variable: NEXT_PUBLIC_USE_VIDEO_AS_BACKGROUND
    value: "false"
  - variable: NEXT_PUBLIC_INCLUDE_TIMESTAMP_IN_USER_MESSAGE
    value: "false"
  - variable: NEXT_PUBLIC_CHAT_LOG_WIDTH
    value: "400"
  - variable: NEXT_PUBLIC_SLIDE_MODE
    value: "false"

  # ===== 人感検知設定 =====
  - variable: NEXT_PUBLIC_PRESENCE_DETECTION_ENABLED
    value: "false"

  # ===== アイドルモード設定 =====
  - variable: NEXT_PUBLIC_IDLE_MODE_ENABLED
    value: "false"

  # ===== キオスクモード設定 =====
  - variable: NEXT_PUBLIC_KIOSK_MODE_ENABLED
    value: "false"

  # ===== メモリ機能設定 =====
  - variable: NEXT_PUBLIC_MEMORY_ENABLED
    value: "false"

  # ===== サーバーサイドAPIキー（シークレット）=====
